# suppress inspection "UnusedProperty"
quarkus.index-dependency.shared.group-id=com.palodon
# suppress inspection "UnusedProperty"
quarkus.index-dependency.shared.artifact-id=shared-lib-jvm
# suppress inspection "UnusedProperty"
quarkus.bootstrap.workspace-discovery=false

# Disable schema generation
quarkus.hibernate-orm.database.generation=none

# Disable dev mode schema validation (prevents SchemaManagementIntegrator errors for SQLite)
quarkus.hibernate-orm.validate-in-dev-mode=false

# Physical naming strategy to handle schema limitations in SQLite
quarkus.hibernate-orm.physical-naming-strategy=com.palodon.server.persistence.PalodonPhysicalNamingStrategy
